name: Uptime CI
on:
  push:
    branches: [master]
  schedule:
    - cron: "0 * * * *"       # every hour (free tier limit for GH Actions)
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Upptime
        uses: upptime/uptime-monitor@master
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          config-file-location: .uptimerc.yml
